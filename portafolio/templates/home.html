<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Portafolio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-weight: bold;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 40px;
        }

        .card {
            background: #111;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            height: 180px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .card-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn-custom {
            background: #2563eb;
            color: white;
            border-radius: 20px;
        }

        .btn-custom:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <h1>My Projects</h1>
    <p class="subtitle">Mis trabajos y desarrollos recientes</p>

    <div class="container">
        <div class="row justify-content-center">

            {% for project in projects %}
            <div class="col-md-4 mb-4">
                <div class="card">

                    <img src="{{ project.image }}" alt="">

                    <div class="card-body">
                        <h5 class="card-title">{{ project.title }}</h5>

                        <a href="{{ project.url }}" target="_blank" class="btn btn-custom btn-sm">
                            Ver más
                        </a>
                    </div>

                </div>
            </div>
            {% endfor %}

        </div>
    </div>

</body>
</html>

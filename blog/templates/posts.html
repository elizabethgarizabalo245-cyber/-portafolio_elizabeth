{% extends 'layout.html' %}
<div class="row">

{% for post in posts %}
<div class="col-md-4 mb-4">

  <div class="card bg-dark text-white h-100">

    {% if post.image %}
    <img src="{{ post.image.url }}" class="card-img-top">
    {% endif %}

    <div class="card-body">
      <h5>{{ post.title }}</h5>
      <p>{{ post.description|truncatechars:100 }}</p>
    </div>

  </div>

</div>
{% endfor %}

</div>
